<!DOCTYPE html>
<html lang="pt-BR" data-slug="pricing-strategy-playbook" data-repo="wikia" data-wiki-base="https://felipeggv.github.io/wikia/gitpages">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pricing Strategy Playbook · wikia</title>
<meta name="description" content="A escolha do modelo de pricing define **toda** a economia do produto: margem, velocidade de aquisição, perfil do cliente atraído e a viabilidade do crescimento.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* =========================================================
   WIKIA · BLOG/WIKI INTERNO
   Maestro dark green + 100% JetBrains Mono
   Heading sizes EM-based (extraídos do Maestro app.asar):
     h1: 1.5em / h2: 1.3em / h3: 1.15em / h4: 1.05em
     todos color: textMain, weight 600
   Layout: topbar 48px + sidebar collapsible (280px↔48px) + content centered
   ========================================================= */
:root {
  /* Theme tokens (snapshot Maestro) */
    --bg-main: #0c0e0c;
  --bg-sidebar: #0f100f;
  --bg-activity: #141415;
  --border: #111311;
  --text-main: #f2ebc0;
  --text-dim: #cec8ba;
  --accent: #5b675b;
  --accent-dim: #262121;
  --accent-text: #ffffff;
  --success: #bed78e;
  --warning: #d0a795;
  --error: #ff5555;


  /* ---------- Typography ---------- */
  --font: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  --body-size: 14px;
  --body-lh: 1.7;

  /* ---------- Layout ---------- */
  --topbar-h: 48px;
  --sidebar-w: 280px;
  --sidebar-collapsed-w: 48px;
  --content-compact: 720px;
  --content-wide: 960px;
  --content-w: var(--content-compact);

  /* ---------- Spacing ---------- */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 20px;
  --s-6: 24px;
  --s-7: 32px;
  --s-8: 48px;
  --s-9: 64px;

  /* ---------- Backwards-compat aliases ---------- */
  --font-sans: var(--font);
  --font-serif: var(--font);
  --font-mono: var(--font);
  --body-family: var(--font);
  --h1-family: var(--font);
  --h2-family: var(--font);
  --h3-family: var(--font);
  --ui-family: var(--font);
  --code-family: var(--font);
  --ui-size: 11px;
  --ui-weight: 600;
  --ui-tracking: 0.08em;
  --code-size: 13px;
  --text-xs: 11px;
  --text-sm: 13px;
  --text-base: 14px;
  --text-lg: 16px;
  --text-xl: 18px;
  --text-2xl: 21px;
  --text-3xl: 21px;
  --space-1: var(--s-1);
  --space-2: var(--s-2);
  --space-3: var(--s-3);
  --space-4: var(--s-4);
  --space-5: var(--s-5);
  --space-6: var(--s-6);
  --space-7: var(--s-7);
  --space-8: var(--s-8);
  --space-9: var(--s-9);
}

/* "wide" mode set on <body> by topbar toggle */
body[data-width="wide"] { --content-w: var(--content-wide); }

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-main);
  color: var(--text-main);
  font-family: var(--font);
  font-size: var(--body-size);
  line-height: var(--body-lh);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* =========================================================
   TOPBAR — sticky 48px
   ========================================================= */
.wk-topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--topbar-h);
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  padding: 0 var(--s-4);
  gap: var(--s-4);
  font-size: 13px;
}
.wk-topbar .wk-burger {
  width: 28px;
  height: 28px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  cursor: pointer;
  font: inherit;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  font-size: 14px;
}
.wk-topbar .wk-burger:hover { color: var(--text-main); border-color: var(--accent); }

.wk-topbar .wk-brand {
  font-family: var(--font);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-main);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.wk-topbar .wk-brand::before {
  content: "■";
  color: var(--accent);
  font-size: 10px;
}
.wk-topbar .wk-brand .dim { color: var(--text-dim); font-weight: 400; margin-left: 4px; font-size: 11px; }

.wk-topbar .wk-spacer { flex: 1; }

.wk-topbar .wk-search-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-main);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 10px;
  color: var(--text-dim);
  cursor: pointer;
  font: inherit;
  font-size: 12px;
  min-width: 200px;
}
.wk-topbar .wk-search-btn:hover { border-color: var(--accent); color: var(--text-main); }
.wk-topbar .wk-search-btn .kbd {
  background: var(--accent-dim);
  border: 1px solid var(--border);
  padding: 1px 5px;
  border-radius: 2px;
  font-size: 10px;
  margin-left: auto;
  color: var(--text-dim);
}

.wk-topbar .wk-width-toggle {
  display: inline-flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.wk-topbar .wk-width-toggle button {
  background: transparent;
  border: none;
  padding: 4px 10px;
  color: var(--text-dim);
  cursor: pointer;
  font: inherit;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.wk-topbar .wk-width-toggle button:hover { color: var(--text-main); }
.wk-topbar .wk-width-toggle button.active { background: var(--accent-dim); color: var(--accent); }

/* =========================================================
   APP SHELL — sidebar + main
   ========================================================= */
.wk-shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  min-height: calc(100vh - var(--topbar-h));
  transition: grid-template-columns 0.25s ease;
}
body[data-sidebar="collapsed"] .wk-shell {
  grid-template-columns: var(--sidebar-collapsed-w) 1fr;
}

/* =========================================================
   SIDEBAR — Obsidian file-tree
   ========================================================= */
.wk-sidebar {
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  position: sticky;
  top: var(--topbar-h);
  height: calc(100vh - var(--topbar-h));
  overflow-y: auto;
  padding: var(--s-3) 0;
  font-size: 13px;
  transition: padding 0.25s ease;
}
body[data-sidebar="collapsed"] .wk-sidebar {
  overflow: hidden;
}
body[data-sidebar="collapsed"] .wk-sidebar > *:not(.wk-sidebar-rail) { display: none; }
.wk-sidebar-rail {
  display: none;
  flex-direction: column;
  align-items: center;
  padding-top: 8px;
  gap: 12px;
}
body[data-sidebar="collapsed"] .wk-sidebar-rail { display: flex; }
.wk-sidebar-rail .rail-icon {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  background: var(--bg-main);
}

.wk-sidebar h4 {
  font-family: var(--font);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin: var(--s-4) 0 var(--s-2);
  padding: 0 var(--s-4);
}
.wk-sidebar h4:first-child { margin-top: 0; }

.wk-sidebar .wk-section {
  margin: 0;
}

/* Tree */
.wk-tree {
  list-style: none;
  padding: 0;
  margin: 0;
}
.wk-tree-tema {
  margin: 0;
}
.wk-tree-tema > .tema-label {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px var(--s-4);
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.02em;
  transition: color 0.12s;
}
.wk-tree-tema > .tema-label:hover { color: var(--text-main); }
.wk-tree-tema > .tema-label::before {
  content: "▸";
  color: var(--accent);
  font-size: 9px;
  width: 10px;
  display: inline-block;
  transition: transform 0.15s;
}
.wk-tree-tema[data-open="true"] > .tema-label::before {
  transform: rotate(90deg);
}
.wk-tree-tema > .tema-label .count {
  color: var(--accent);
  font-size: 10px;
  margin-left: auto;
  font-weight: 400;
}
.wk-tree-tema > ul {
  list-style: none;
  padding: 0;
  margin: 0;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.2s ease;
}
.wk-tree-tema[data-open="true"] > ul {
  max-height: 2000px;
}
.wk-tree-tema > ul > li > a {
  display: block;
  padding: 3px var(--s-4) 3px 32px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 12px;
  line-height: 1.5;
  border-left: 2px solid transparent;
  transition: all 0.12s;
}
.wk-tree-tema > ul > li > a:hover {
  color: var(--text-main);
  background: var(--accent-dim);
}
.wk-tree-tema > ul > li > a.current {
  color: var(--accent);
  background: var(--accent-dim);
  border-left-color: var(--accent);
  font-weight: 600;
}

/* Recents */
.wk-recents { list-style: none; padding: 0; margin: 0; }
.wk-recents li { margin: 0; }
.wk-recents a {
  display: block;
  padding: 3px var(--s-4);
  color: var(--text-dim);
  text-decoration: none;
  font-size: 12px;
  line-height: 1.4;
  transition: all 0.12s;
}
.wk-recents a:hover { color: var(--text-main); background: var(--accent-dim); }
.wk-recents a .date {
  display: block;
  font-size: 10px;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

/* =========================================================
   MAIN — centered content
   ========================================================= */
.wk-main {
  padding: var(--s-7) var(--s-6) var(--s-9);
  display: flex;
  justify-content: center;
}
.wk-content {
  width: 100%;
  max-width: var(--content-w);
  transition: max-width 0.2s ease;
}

@media (max-width: 880px) {
  .wk-shell { grid-template-columns: 1fr !important; }
  .wk-sidebar { display: none !important; }
  body[data-sidebar="overlay"] .wk-sidebar {
    display: block !important;
    position: fixed;
    top: var(--topbar-h);
    left: 0;
    width: var(--sidebar-w);
    z-index: 90;
    box-shadow: 0 0 0 1px var(--border), 4px 0 24px rgba(0,0,0,0.4);
  }
  .wk-main { padding: var(--s-5) var(--s-4) var(--s-7); }
}

/* =========================================================
   BREADCRUMB (acima do título)
   ========================================================= */
.wk-breadcrumb {
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin: 0 0 var(--s-5);
  font-weight: 600;
}
.wk-breadcrumb a { color: var(--text-dim); text-decoration: none; }
.wk-breadcrumb a:hover { color: var(--text-main); }
.wk-breadcrumb .sep { color: var(--accent); margin: 0 6px; }
.wk-breadcrumb .current { color: var(--text-main); }

/* =========================================================
   ARTICLE
   ========================================================= */
.wk-article-header {
  margin-bottom: var(--s-6);
  padding-bottom: var(--s-5);
  border-bottom: 1px solid var(--border);
}
.wk-eyebrow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 0 0 var(--s-2);
}

/* Headings: EM-based from Maestro app.asar */
.wk-article h1 {
  font-family: var(--font);
  font-weight: 600;
  font-size: 1.5em;
  line-height: 1.3;
  color: var(--text-main);
  margin: 16px 0 8px;
}
.wk-article h2 {
  font-family: var(--font);
  font-weight: 600;
  font-size: 1.3em;
  line-height: 1.35;
  color: var(--text-main);
  margin: 32px 0 12px;
}
.wk-article h3 {
  font-family: var(--font);
  font-weight: 600;
  font-size: 1.15em;
  line-height: 1.4;
  color: var(--text-main);
  margin: 24px 0 8px;
}
.wk-article h4 {
  font-family: var(--font);
  font-weight: 600;
  font-size: 1.05em;
  line-height: 1.45;
  color: var(--text-main);
  margin: 20px 0 8px;
}

/* H1 first in article header é maior (page title) */
.wk-article-header h1 {
  font-size: 1.7em;
  line-height: 1.2;
  margin: 0 0 var(--s-3);
}

.wk-lead {
  font-family: var(--font);
  font-size: var(--body-size);
  line-height: var(--body-lh);
  color: var(--text-dim);
  margin: 0 0 var(--s-4);
  font-weight: 400;
}
.wk-meta-row {
  display: flex;
  gap: var(--s-3);
  flex-wrap: wrap;
  align-items: center;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 600;
}
.wk-meta-row .tag {
  display: inline-block;
  padding: 2px 8px;
  background: var(--accent-dim);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-dim);
  text-decoration: none;
  font-weight: 600;
  transition: all 0.15s;
}
.wk-meta-row .tag:hover { color: var(--text-main); border-color: var(--accent); }
.wk-meta-row .dot { color: var(--accent); }

/* body content */
.wk-article p {
  font-family: var(--font);
  font-size: var(--body-size);
  font-weight: 400;
  line-height: var(--body-lh);
  color: var(--text-main);
  margin: 0 0 var(--s-3);
}
.wk-article ul, .wk-article ol {
  font-family: var(--font);
  font-size: var(--body-size);
  line-height: var(--body-lh);
  color: var(--text-main);
  padding-left: var(--s-5);
  margin: 0 0 var(--s-3);
}
.wk-article li { margin-bottom: var(--s-1); }
.wk-article li::marker { color: var(--accent); }
.wk-article a {
  color: var(--success);
  text-decoration: underline;
  text-decoration-color: var(--accent);
  text-underline-offset: 3px;
}
.wk-article a:hover { color: var(--text-main); text-decoration-color: var(--success); }
.wk-article strong { color: var(--text-main); font-weight: 700; }
.wk-article em { font-style: italic; color: var(--text-dim); }
.wk-article hr { border: none; border-top: 1px solid var(--border); margin: var(--s-6) 0; }

.wk-article code {
  font-family: var(--font);
  background: var(--bg-sidebar);
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 0.92em;
  color: var(--text-main);
}
.wk-article pre {
  background: var(--bg-sidebar);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: var(--s-3) var(--s-4);
  overflow-x: auto;
  font-family: var(--font);
  font-size: var(--code-size);
  line-height: 1.55;
  margin: var(--s-3) 0;
}
.wk-article pre code {
  background: transparent;
  border: none;
  padding: 0;
  color: var(--text-main);
}

.wk-article blockquote {
  margin: var(--s-4) 0;
  padding: var(--s-2) var(--s-4);
  border-left: 3px solid var(--accent);
  background: var(--bg-sidebar);
  border-radius: 0 4px 4px 0;
  color: var(--text-dim);
  font-style: italic;
}

.wk-article table {
  width: 100%;
  border-collapse: collapse;
  margin: var(--s-4) 0;
  font-family: var(--font);
  font-size: 13px;
}
.wk-article th, .wk-article td {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.wk-article th {
  color: var(--text-dim);
  font-weight: 600;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--accent);
}
.wk-article tr:hover td { background: var(--accent-dim); }

/* =========================================================
   ARTICLE FOOTER
   ========================================================= */
.wk-article-footer {
  margin-top: var(--s-8);
  padding-top: var(--s-4);
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-dim);
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
}
.wk-article-footer .tags { display: flex; gap: 6px; flex-wrap: wrap; }
.wk-article-footer .meta {
  display: flex;
  gap: var(--s-3);
  align-items: center;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}
.wk-article-footer .meta .accent { color: var(--accent); }

/* =========================================================
   WIKI HOME — chronological feed (no cards)
   ========================================================= */
.wk-feed { list-style: none; padding: 0; margin: var(--s-7) 0 0; }
.wk-feed li { padding: var(--s-5) 0; border-bottom: 1px solid var(--border); }
.wk-feed li:first-child { padding-top: 0; }
.wk-feed li:last-child { border-bottom: none; }
.wk-feed .feed-meta {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-dim);
  font-weight: 600;
  margin-bottom: var(--s-2);
}
.wk-feed .feed-meta .accent { color: var(--accent); margin-left: var(--s-2); }
.wk-feed .feed-title {
  font-size: 1.3em;
  font-weight: 600;
  color: var(--text-main);
  text-decoration: none;
  display: block;
  margin-bottom: var(--s-2);
  line-height: 1.3;
}
.wk-feed .feed-title:hover { color: var(--accent); }
.wk-feed .feed-snippet {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.65;
  margin: 0 0 var(--s-2);
}
.wk-feed .feed-link {
  font-size: 11px;
  color: var(--accent);
  text-decoration: none;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 600;
}

/* =========================================================
   SEARCH MODAL (⌘K)
   ========================================================= */
#wk-search-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; align-items: flex-start; justify-content: center; padding-top: 100px; }
#wk-search-modal.open { display: flex; }
#wk-search-modal .wk-search-card { width: 100%; max-width: 600px; background: var(--bg-sidebar); border: 1px solid var(--accent); border-radius: 6px; box-shadow: 0 24px 60px rgba(0,0,0,0.7); }
#wk-search-modal input { width: 100%; padding: 14px 18px; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text-main); font: inherit; font-size: 14px; outline: none; font-family: var(--font); }
#wk-search-results { max-height: 380px; overflow-y: auto; }
#wk-search-results .item { display: block; padding: 12px 18px; cursor: pointer; color: var(--text-dim); font-size: 13px; text-decoration: none; border-bottom: 1px solid var(--border); }
#wk-search-results .item:last-child { border-bottom: none; }
#wk-search-results .item:hover, #wk-search-results .item.selected { background: var(--accent-dim); color: var(--text-main); }
#wk-search-results .item .title { color: var(--text-main); font-weight: 600; }
#wk-search-results .item .meta { font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }

/* =========================================================
   SCROLLBAR + SELECTION
   ========================================================= */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-sidebar); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }
::selection { background: var(--accent); color: var(--accent-text); }

/* Legacy aliases for backwards compat */
.ap-article { /* old class name */ }
.ap-page { max-width: var(--content-w); margin: 0 auto; padding: var(--s-5); }

</style>

</head>
<body>

<div id="ap-gate">
  <div class="ap-gate-card">
    <div class="ap-gate-badge">protected · wikia</div>
    <h1 class="ap-gate-title">Acesso ao wiki</h1>
    <p class="ap-gate-lead">Conteúdo criptografado AES-256-GCM. Senha única do wiki destrava todos os artigos nesta sessão.</p>
    <form id="ap-gate-form">
      <label for="ap-gate-input">senha</label>

      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      baseKey, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );
  }

  async function tryUnlock(pwd) {
    try {
      const salt = b64(SALT_B64), iv = b64(IV_B64), cipher = b64(ENCRYPTED_PAYLOAD);
      const key = await deriveKey(pwd, salt);
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cipher);
      mount.innerHTML = new TextDecoder().decode(plain);
      mount.querySelectorAll('script').forEach(old => {
        const s = document.createElement('script');
        if (old.src) s.src = old.src; else s.textContent = old.textContent;
        old.replaceWith(s);
      });
      gate.style.display = 'none';
      mount.style.display = 'block';
      // localStorage — persiste cross-page e cross-session
      localStorage.setItem(STORAGE_KEY, pwd);
      return true;
    } catch (e) { return false; }
  }

  // Auto-unlock: se já tem chave salva no localStorage, tenta
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    tryUnlock(saved).then(ok => { if (!ok) localStorage.removeItem(STORAGE_KEY); });
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = '';
    const ok = await tryUnlock(input.value);
    if (!ok) { err.textContent = '✗ senha incorreta'; input.value = ''; input.focus(); }
  });
})();
</script>




<script>
(function() {
  const tpl = document.getElementById('ap-content-tpl');
  if (!tpl) return;
  const mount = document.getElementById('ap-content-mount');
  if (mount) {
    mount.innerHTML = tpl.innerHTML;
    // Re-execute injected scripts
    mount.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      if (old.src) s.src = old.src; else s.textContent = old.textContent;
      old.replaceWith(s);
    });
    mount.style.display = 'block';
  } else {
    document.body.appendChild(tpl.content.cloneNode(true));
  }
})();
</script>
